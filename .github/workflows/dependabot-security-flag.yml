name: Dependabot security flag

# Rewrites the PR title of any Dependabot security-update PR to start with
# "🚨 SECURITY:" so it stands out in Gmail subject lines. Also applies the
# `security` label.
#
# Dependabot's "security-updates" mechanism is separate from "version-updates"
# and bypasses the `ignore` rules in dependabot.yml — so even with majors
# deferred, a CVE-driven PR will still open and get loud-flagged here.

on: pull_request_target

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  flag:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prefix title and label security PRs
        if: steps.meta.outputs.alert-state == 'OPEN'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$PR_TITLE" != 🚨* ]]; then
            gh pr edit "$PR_URL" --title "🚨 SECURITY: $PR_TITLE"
          fi
          gh pr edit "$PR_URL" --add-label security
