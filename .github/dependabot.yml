version: 2

# Hands-off Dependabot config.
# Goal: at most 2 PRs from this file per monthly cycle (1 versions, 1 security).
# Pattern documented at: ~/code/Agents Hub/vault/40-reference/servers-security-deployment.md
# (see "Hands-off ≠ silent" section).

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 2
    versioning-strategy: increase
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
    # Hands-off policy: ignore ALL major-version bumps. Majors require
    # intentional migration/testing. Security-updates IGNORE these rules,
    # so CVE-driven majors still surface via the security-flag workflow.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      # One PR for all security fixes (any update-type).
      root-security:
        applies-to: security-updates
        patterns:
          - "*"
      # One PR for all non-major version updates (prod + dev).
      root-versions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions):"
    groups:
      actions:
        patterns:
          - "*"
